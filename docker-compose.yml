services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: atomquest
      POSTGRES_USER: atomquest
      POSTGRES_PASSWORD: atomquest123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U atomquest" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  celery_worker:
    build: ./backend
    command: celery -A app.tasks.scheduler worker --loglevel=info
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql://atomquest:atomquest123@db:5432/atomquest
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  celery_beat:
    build: ./backend
    command: celery -A app.tasks.scheduler beat --loglevel=info
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql://atomquest:atomquest123@db:5432/atomquest
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  pgdata:
  redisdata:
